<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#070b16"/>
  <title>Life Grid</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="bg-noise" aria-hidden="true"></div>

  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="#/dashboard" aria-label="Life Grid Life Grid">
        <span class="brand-mark">🏛️</span>
        <span class="brand-text">
          <span class="brand-title">PILLARS</span>
          <span class="brand-subtitle">Life Grid</span>
        </span>
      </a>

      <nav class="nav" aria-label="Primary">
        <a class="nav-link" href="#/dashboard" data-nav="dashboard">Dashboard</a>
        <a class="nav-link" href="#/log" data-nav="log">Log</a>
        <a class="nav-link" href="#/settings" data-nav="settings">Settings</a>
      </nav>
    </div>
  </header>

  <main class="main" id="app" role="main"></main>

  <div class="tooltip" id="tooltip" role="tooltip" aria-hidden="true">
    <div class="tooltip-title" id="tt-title"></div>
    <div class="tooltip-body" id="tt-body"></div>
  </div>

  <script type="module" src="./app.js"></script>
  <script>
    // Service workers are intentionally disabled in the APK build.
    // The APK already bundles all assets locally, and disabling SW avoids stale-cache blank screens after updates.
  </script>
</body>
</html>
